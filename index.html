<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наші Захцянки ✨</title>
    <!-- Підключаємо стилі та шрифти -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { 
            font-family: 'Nunito', sans-serif;
            background-color: #fff5f7;
            color: #1e293b;
        }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: floating 3s ease-in-out infinite; }
        
        .wish-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .wish-card:hover {
            transform: translateY(-5px) scale(1.02);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrCRLCpuowPNO2Nm46CdEFw_9G8nPUSvM",
            authDomain: "bazhanya-4e81e.firebaseapp.com",
            projectId: "bazhanya-4e81e",
            storageBucket: "bazhanya-4e81e.firebasestorage.app",
            messagingSenderId: "506381419509",
            appId: "1:506381419509:web:f2d6ea5e79aa580a0056bc",
            measurementId: "G-KBVFK4PSQX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Робимо Firebase доступним глобально для нашого React компонента
        window.fb = { db, auth, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    window.lucide.createIcons({ targets: [ref.current] });
                }
            }, [name]);
            return <i data-lucide={name} className={className} ref={ref}></i>;
        };

        const PRIORITY = {
            low: { label: 'Хочеться', color: 'bg-green-100 text-green-700', dot: 'bg-green-500' },
            medium: { label: 'Дуже хочу', color: 'bg-orange-100 text-orange-700', dot: 'bg-orange-500' },
            high: { label: 'Мрія!', color: 'bg-red-100 text-red-700', dot: 'bg-red-500' }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [wishes, setWishes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [filter, setFilter] = useState('active');
            const [uploading, setUploading] = useState(false);
            
            const [formData, setFormData] = useState({ title: '', link: '', imageUrl: '', priority: 'low' });
            const fileInputRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    // Чекаємо поки скрипт Firebase ініціалізується
                    if (!window.fb) {
                        setTimeout(init, 100);
                        return;
                    }
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, query, onSnapshot, orderBy } = window.fb;
                    
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => setUser(u));

                        const wishesRef = collection(db, 'wishes');
                        const q = query(wishesRef, orderBy('createdAt', 'desc'));

                        onSnapshot(q, (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setWishes(data);
                            setLoading(false);
                        });
                    } catch (err) {
                        console.error("Firebase Error:", err);
                    }
                };
                init();
            }, []);

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const max = 800;
                        if (w > h && w > max) { h *= max/w; w = max; }
                        else if (h > max) { w *= max/h; h = max; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setFormData(prev => ({ ...prev, imageUrl: canvas.toDataURL('image/jpeg', 0.7) }));
                        setUploading(false);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const saveWish = async (e) => {
                e.preventDefault();
                if (!formData.title || !user) return;
                
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    await addDoc(collection(db, 'wishes'), {
                        ...formData,
                        status: 'active',
                        userId: user.uid,
                        createdAt: serverTimestamp()
                    });
                    setFormData({ title: '', link: '', imageUrl: '', priority: 'low' });
                    setIsFormOpen(false);
                } catch (e) { console.error(e); }
            };

            const updateStatus = async (id, status) => {
                const { db, doc, updateDoc } = window.fb;
                await updateDoc(doc(db, 'wishes', id), { status });
            };

            const removeWish = async (id) => {
                if (!confirm("Видалити цю захцянку?")) return;
                const { db, doc, deleteDoc } = window.fb;
                await deleteDoc(doc(db, 'wishes', id));
            };

            const filtered = wishes.filter(w => w.status === filter);

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="sticky top-0 z-40 glass px-6 py-4 border-b border-pink-100">
                        <div className="max-w-2xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-pink-500 p-2 rounded-2xl shadow-lg shadow-pink-200">
                                    <Icon name="heart" className="w-6 h-6 text-white fill-current" />
                                </div>
                                <h1 className="text-xl font-extrabold bg-gradient-to-r from-pink-600 to-rose-500 bg-clip-text text-transparent">Наші Захцянки</h1>
                            </div>
                            <button onClick={() => setIsFormOpen(true)} className="bg-slate-900 text-white p-3 rounded-full shadow-lg active:scale-95 transition-transform">
                                <Icon name="plus" />
                            </button>
                        </div>
                    </header>

                    {/* Main */}
                    <main className="max-w-2xl mx-auto px-6 mt-8">
                        {/* Tabs */}
                        <div className="flex gap-2 mb-8 overflow-x-auto no-scrollbar pb-2">
                            {['active', 'completed', 'cancelled'].map(type => (
                                <button 
                                    key={type}
                                    onClick={() => setFilter(type)}
                                    className={`px-5 py-2 rounded-full text-sm font-bold transition-all whitespace-nowrap ${filter === type ? 'bg-white text-pink-600 shadow-md' : 'text-slate-400'}`}
                                >
                                    {type === 'active' ? 'Чекають ✨' : type === 'completed' ? 'Зроблено! ✅' : 'Архів 📁'}
                                </button>
                            ))}
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-20 opacity-30">
                                <Icon name="loader-2" className="w-10 h-10 animate-spin" />
                            </div>
                        ) : filtered.length === 0 ? (
                            <div className="text-center py-20 bg-white/40 rounded-[3rem] border-2 border-dashed border-pink-200 text-slate-400">
                                <p className="italic">Тут поки пусто... час щось додати! ✨</p>
                            </div>
                        ) : (
                            <div className="grid gap-6">
                                {filtered.map(wish => (
                                    <div key={wish.id} className="wish-card bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-xl border border-pink-50">
                                        {wish.imageUrl && <img src={wish.imageUrl} className="w-full h-64 object-cover" />}
                                        <div className="p-6">
                                            <div className="flex justify-between items-start gap-4">
                                                <div className="flex-1">
                                                    <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${PRIORITY[wish.priority].color}`}>
                                                        {PRIORITY[wish.priority].label}
                                                    </span>
                                                    <h3 className={`text-xl font-bold mt-2 ${wish.status === 'completed' ? 'line-through text-slate-300' : 'text-slate-800'}`}>{wish.title}</h3>
                                                </div>
                                                {wish.link && (
                                                    <a href={wish.link} target="_blank" className="p-3 bg-pink-50 text-pink-500 rounded-2xl">
                                                        <Icon name="external-link" />
                                                    </a>
                                                )}
                                            </div>
                                            
                                            <div className="flex gap-2 mt-6">
                                                {wish.status === 'active' ? (
                                                    <>
                                                        <button onClick={() => updateStatus(wish.id, 'completed')} className="flex-1 py-3 bg-green-500 text-white rounded-2xl font-bold text-xs shadow-lg shadow-green-100">ВИКОНАНО</button>
                                                        <button onClick={() => updateStatus(wish.id, 'cancelled')} className="p-3 bg-slate-100 text-slate-400 rounded-2xl"><Icon name="archive" /></button>
                                                    </>
                                                ) : (
                                                    <button onClick={() => updateStatus(wish.id, 'active')} className="w-full py-3 bg-pink-100 text-pink-600 rounded-2xl font-bold text-xs">ПОВЕРНУТИ</button>
                                                )}
                                                <button onClick={() => removeWish(wish.id)} className="p-3 text-slate-300 hover:text-rose-500 transition-colors"><Icon name="trash-2" /></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal Form */}
                    {isFormOpen && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-lg rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">Нова захцянка ✨</h2>
                                    <button onClick={() => setIsFormOpen(false)}><Icon name="x" className="w-6 h-6 text-slate-300" /></button>
                                </div>
                                <form onSubmit={saveWish} className="space-y-5">
                                    <input required placeholder="Що саме хочемо?" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-pink-200 outline-none transition-all" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    
                                    <div onClick={() => fileInputRef.current.click()} className="relative h-44 border-3 border-dashed border-pink-100 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer hover:bg-pink-50 overflow-hidden">
                                        {uploading ? <Icon name="loader-2" className="animate-spin text-pink-500" /> : 
                                         formData.imageUrl ? <img src={formData.imageUrl} className="w-full h-full object-cover" /> : 
                                         <><Icon name="camera" className="text-pink-300 mb-2" /><span className="text-xs font-bold text-pink-300 uppercase">Додати фото</span></>}
                                        <input type="file" hidden ref={fileInputRef} accept="image/*" onChange={handlePhoto} />
                                    </div>

                                    <input placeholder="Посилання (якщо є)" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} />
                                    
                                    <div className="flex gap-2">
                                        {Object.entries(PRIORITY).map(([id, p]) => (
                                            <button key={id} type="button" onClick={() => setFormData({...formData, priority: id})} className={`flex-1 py-3 rounded-2xl border-2 text-[10px] font-black uppercase transition-all ${formData.priority === id ? 'border-pink-500 bg-pink-50 text-pink-600' : 'border-transparent bg-slate-50 text-slate-400'}`}>
                                                {p.label}
                                            </button>
                                        ))}
                                    </div>

                                    <button type="submit" disabled={uploading || !formData.title} className="w-full py-5 bg-pink-500 text-white rounded-[2rem] font-black text-lg shadow-xl shadow-pink-100 active:scale-95 transition-transform disabled:opacity-50">
                                        ДОДАТИ ✨
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-6 left-0 right-0 pointer-events-none flex justify-center">
                        <div className="glass px-6 py-2 rounded-full shadow-lg text-[10px] font-black text-pink-400 uppercase tracking-widest pointer-events-auto">
                            Made with love ❤️
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
